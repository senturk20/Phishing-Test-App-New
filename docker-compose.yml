services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: phishing-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=phishing
      - POSTGRES_PASSWORD=phishing_secret
      - POSTGRES_DB=phishing_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phishing -d phishing_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network

  # ── OpenLDAP ────────────────────────────────────────────────
  ldap:
    image: osixia/openldap:1.5.0
    container_name: phishing-ldap
    restart: unless-stopped
    environment:
      - LDAP_ORGANISATION=University
      - LDAP_DOMAIN=university.edu.tr
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD:-admin}
      - LDAP_TLS=false
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
      - ./ldap/init.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/init.ldif:ro
    ports:
      - "389:389"
    command: --copy-service
    networks:
      - app-network

  # ── Redis (BullMQ) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: phishing-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  # ── MailHog (SMTP test) ────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: phishing-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - app-network

  # ── Backend API (Port 8080) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phishing-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - USE_MEMORY_DB=false
      - NODE_OPTIONS=--max-old-space-size=2048
      # CORS — every origin the browser might use
      - CORS_ORIGIN=http://localhost,http://localhost:80,http://localhost:3001,http://localhost:8080
      # Service discovery via Docker DNS (service names, not container names)
      - DATABASE_URL=postgresql://phishing:phishing_secret@postgres:5432/phishing_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - LDAP_URL=ldap://ldap:389
      - LDAP_ADMIN_DN=cn=admin,dc=university,dc=edu,dc=tr
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD:-admin}
      - LDAP_BASE_DN=dc=university,dc=edu,dc=tr
      - LDAP_USERS_OU=ou=users
      - TRACKING_BASE_URL=http://localhost:3001
      - FINAL_REDIRECT_URL=${FINAL_REDIRECT_URL:-https://www.estu.edu.tr}
    volumes:
      - ./backend/static/clones:/app/static/clones
      - backend_crashlogs:/app/logs
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - app-network

  # ── Frontend (Vite Dev — Port 3001 on host) ────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: phishing-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    environment:
      - VITE_API_URL=http://localhost:8080
      - CHOKIDAR_USEPOLLING=true
      - NODE_OPTIONS=--max-old-space-size=2048
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      backend: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  ldap_data:
  ldap_config:
  backend_crashlogs:
